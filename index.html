<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santander VCN Manager</title>
<style>
:root {
  --red: #EC0000;
  --orange: #FF5F00;
  --dark: #1A1A1A;
  --bg: #F5F6FA;
  --white: #FFFFFF;
  --border: #E0E4E8;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --green: #27ae60;
  --text-muted: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; font-size: 14px; }

/* LOGIN */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.4s; }
.login-box { width: 100%; max-width: 680px; text-align: center; padding: 20px; }
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 36px; }
.role-card { background: var(--white); padding: 36px 20px; border-radius: 12px; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; transition: all 0.25s; }
.role-card:hover { border-color: var(--red); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.role-card .icon { font-size: 38px; display: block; margin-bottom: 14px; font-style: normal; font-variant: normal; transform: none; }
.role-card h3 { font-size: 16px; margin-bottom: 8px; }
.role-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.login-form-card { max-width: 400px; margin: 0 auto; text-align: left; background: var(--white); border-radius: 10px; box-shadow: var(--shadow); padding: 28px; }
.role-badge { background: #f0f0f0; padding: 10px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; margin-bottom: 22px; display: flex; justify-content: space-between; align-items: center; }
.role-badge a { color: var(--red); text-decoration: none; font-weight: 600; }

/* APP LAYOUT */
#app { display: none; grid-template-columns: 220px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }
#app.visible { display: grid; }
header { grid-column: 1/-1; background: var(--red); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
.sidebar { background: var(--white); border-right: 1px solid var(--border); padding-top: 16px; overflow-y: auto; }
.nav-item { padding: 11px 22px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 500; color: #666; border-left: 3px solid transparent; transition: all 0.2s; font-size: 13px; }
.nav-item:hover { background: #f9fafb; color: var(--dark); }
.nav-item.active { background: #fff0f0; color: var(--red); border-left-color: var(--red); font-weight: 600; }
.main { padding: 28px; overflow-y: auto; background: var(--bg); }

/* COMPONENTS */
.mc-logo { display: flex; align-items: center; gap: 10px; }
.mc-circles { position: relative; width: 32px; height: 20px; flex-shrink: 0; }
.circle { position: absolute; width: 20px; height: 20px; border-radius: 50%; }
.c-red { background: var(--red); left: 0; }
.c-orange { background: var(--orange); right: 0; opacity: 0.92; }
.card { background: var(--white); border-radius: 8px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 18px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-green { background: #e8f8ef; color: var(--green); }
.badge-orange { background: #fff3eb; color: var(--orange); }
.badge-red { background: #ffeaea; color: var(--red); }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.metric { background: var(--white); border-radius: 8px; box-shadow: var(--shadow); padding: 18px; }
.metric label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
.metric .val { font-size: 22px; font-weight: 700; }
.metric .sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.bar-wrap { height: 8px; background: #eee; border-radius: 4px; margin-top: 6px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--red); border-radius: 4px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--bg); color: var(--text-muted); font-weight: 600; white-space: nowrap; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
td { padding: 11px 12px; border-bottom: 1px solid var(--bg); white-space: nowrap; font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr.row:hover { background: #fafafa; cursor: pointer; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 5px; font-weight: 600; cursor: pointer; border: none; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
.btn:hover { opacity: 0.88; }
.btn-red { background: var(--red); color: white; }
.btn-orange { background: var(--orange); color: white; }
.btn-outline-orange { background: transparent; border: 1.5px solid var(--orange); color: var(--orange); }
.btn-outline-red { background: transparent; border: 1.5px solid var(--red); color: var(--red); }
.btn-grey { background: #e5e5e5; color: #666; cursor: default; }
.btn-green { background: var(--green); color: white; }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* PANEL */
.panel { position: fixed; top: 60px; right: -520px; width: 480px; bottom: 0; background: var(--white); box-shadow: -4px 0 20px rgba(0,0,0,0.1); z-index: 300; transition: right 0.35s cubic-bezier(0.4,0,0.2,1); padding: 26px; overflow-y: auto; }
.panel.open { right: 0; }
.panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.panel-head h3 { font-size: 17px; }
.close-btn { font-size: 22px; cursor: pointer; color: #999; line-height: 1; }
.close-btn:hover { color: var(--dark); }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.fg input, .fg select, .fg textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; }
.fg input:focus, .fg select:focus { outline: none; border-color: var(--orange); }
.toggle-row { display: flex; background: #eee; padding: 3px; border-radius: 6px; margin-bottom: 16px; }
.tog { flex: 1; text-align: center; padding: 8px; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 4px; color: #666; transition: all 0.2s; }
.tog.on { background: white; color: var(--dark); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.cf-head { padding: 12px 14px; background: #f8f9fa; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; margin: 14px 0 8px; }
.cf-body { padding: 10px; background: #fafafa; border-radius: 4px; font-size: 12px; }
.cf-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cf-row input[type=checkbox] { width: auto; }
.cf-row input[type=text] { flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
.success-card { background: var(--dark); color: white; border-radius: 10px; padding: 20px; margin: 16px 0; font-family: monospace; }
.success-card .card-num { font-size: 17px; letter-spacing: 2px; margin: 8px 0 16px; }
.success-card .card-meta { display: flex; gap: 30px; font-size: 12px; }
.success-card .card-meta span { opacity: 0.6; display: block; margin-bottom: 2px; font-size: 10px; }

/* MODAL */
#modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 900; align-items: center; justify-content: center; }
#modal-bg.open { display: flex; }
#modal-box { background: var(--white); border-radius: 10px; padding: 28px; width: 440px; max-width: 95vw; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
#modal-box h3 { margin-bottom: 14px; }

/* MISC */
.hidden { display: none !important; }
.fade { animation: fi 0.3s ease; }
@keyframes fi { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.page-title { font-size: 20px; font-weight: 700; margin-bottom: 22px; }
.section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.info-box { background: #fff8f0; border: 1px solid #ffe0c0; border-radius: 6px; padding: 12px 14px; font-size: 12px; color: #b85c00; margin: 12px 0; line-height: 1.5; }
.action-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.tbl-wrap { overflow-x: auto; }
.pending-card { border: 1px solid var(--border); border-radius: 8px; padding: 18px; background: #fdfdfd; }
.pending-card h4 { margin-bottom: 12px; }
.pending-meta { font-size: 13px; color: #555; line-height: 2; }
.approve-row { display: flex; gap: 10px; margin-top: 16px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div id="step1" class="login-box">
    <div class="mc-logo" style="justify-content:center;margin-bottom:12px;">
      <div class="mc-circles"><div class="circle c-red"></div><div class="circle c-orange"></div></div>
      <h1 style="font-size:26px;font-weight:800;">Santander VCN Manager</h1>
    </div>
    <p style="color:var(--text-muted);margin-bottom:4px;">B2B Virtual Card Management</p>
    <div class="role-grid" style="grid-template-columns: 1fr;">
      <div class="role-card" onclick="startApp()">
        <span class="icon">🏦</span>
        <h3>Bank Administrator</h3>
        <p>Manage business customers, credit lines and card programmes</p>
      </div></div>
  </div>
  <div id="step2" class="login-box hidden">
    <div class="login-form-card">
      <div class="role-badge">
        <span>Logging in as: <span id="role-label">Bank Administrator</span></span>
        <a href="#" onclick="backToStep1();return false;">← Change</a>
      </div>
      <div class="fg"><label>Email Address</label><input id="login-email" type="text" value="admin@partnerbanco.es"></div>
      <div class="fg"><label>Password</label><input type="password" value="demo1234"></div>
      <button class="btn btn-red" style="width:100%;padding:12px;background:var(--red);" onclick="startApp()">Login →</button>
      <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:12px;">Demo credentials pre-filled for presentation</p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="mc-logo">
      <div class="mc-circles"><div class="circle c-red"></div><div class="circle c-orange"></div></div>
      <span style="font-weight:800;font-size:17px;letter-spacing:-0.3px;color:white;">Santander VCN Manager</span>
    </div>
    <span id="hdr-sub" style="font-size:13px;opacity:0.7;font-weight:500;"></span>
    <div style="display:flex;align-items:center;gap:18px;">
      <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:0.6;">Powered by Mastercard</span>
      <button class="btn" style="background:rgba(255,255,255,0.1);color:white;padding:6px 14px;font-size:12px;" onclick="location.reload()">Logout</button>
    </div>
  </header>
  <div class="sidebar" id="sidebar"></div>
  <div class="main fade" id="main"></div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div id="panel-inner"></div>
</div>

<!-- MODAL -->
<div id="modal-bg" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div id="modal-inner"></div>
    <button class="btn btn-red" style="margin-top:18px;" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const S = { role:'bank', view:'overview', vcnSel:[] };

const BANK_NAV = [
  {id:'overview',icon:'🏠',label:'Overview'},
  {id:'businesses',icon:'👥',label:'Businesses with Cards'},
  {id:'eligible',icon:'➕',label:'Eligible Businesses'},
  {id:'settings',icon:'⚙️',label:'Settings'},
];


function goLogin(role) {
  S.role = 'bank';
  startApp();
}
function backToStep1() {
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
}
function startApp() {
  document.getElementById('login-screen').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('login-screen').classList.add('hidden');
    const app = document.getElementById('app');
    app.classList.add('visible');
    document.getElementById('hdr-sub').innerText = 'Bank Administrator — Partner Banco';
    renderSidebar();
    go('overview');
  },350);
}

function renderSidebar() {
  const nav = BANK_NAV;
  document.getElementById('sidebar').innerHTML = nav.map(n=>`
    <div class="nav-item ${S.view===n.id?'active':''}" onclick="go('${n.id}')">
      <span style="font-size:16px;font-style:normal;">${n.icon}</span>${n.label}
    </div>`).join('');
}

function go(v) {
  S.view=v; renderSidebar(); closePanel();
  const m = document.getElementById('main');
  m.className='main fade';
  const views = {overview:bankOverview, businesses:bankBusinesses, eligible:bankEligible, settings:settingsView};
  (views[v]||settingsView)();
}

/* ===== PANEL ===== */
function openPanel(html) {
  document.getElementById('panel-inner').innerHTML = html;
  document.getElementById('panel').classList.add('open');
}
function closePanel() { document.getElementById('panel').classList.remove('open'); }

/* ===== MODAL ===== */
function modal(title, body) {
  document.getElementById('modal-inner').innerHTML = `<h3>${title}</h3><div style="margin-top:14px;text-align:left;">${body}</div>`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

/* ===== HELPERS ===== */
function H(strings,...vals) { return strings.reduce((a,s,i)=>a+s+(vals[i]!=null?String(vals[i]):''),''); }
function set(id,html) { const el=document.getElementById(id); if(el) el.innerHTML=html; }

/* ============================================================
   BANK VIEWS
   ============================================================ */
function bankOverview() {
  document.getElementById('main').innerHTML = `
    <div class="page-title">Bank Overview</div>
    <div class="metrics">
      <div class="metric"><label>Total Businesses</label><div class="val">3</div></div>
      <div class="metric"><label>Cards Issued</label><div class="val">9</div></div>
      <div class="metric"><label>Credit Extended</label><div class="val">€220,000</div></div>
      <div class="metric"><label>Total Amount Due</label><div class="val">€17,830</div></div>
    </div>
    <div class="card">
      <div class="section-title">Credit Utilisation per Business</div>
      ${[
          ['Restaurante Sol Madrid',37,'€18,340','€50,000'],
          ['Tapas & Co S.L.',28,'€5,600','€20,000'],
          ['Hotel Castellana Group',42,'€63,000','€150,000']
        ].map(([n,p,used,limit])=>`
        <div style="margin-bottom:18px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
            <span style="font-weight:600;">${n}</span>
            <span style="color:var(--text-muted);">${used} used of ${limit} &nbsp;|&nbsp; <b>${p}%</b></span>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${p}%"></div></div>
        </div>`).join('')}
    </div>`;
}

function bankBusinesses() {
  document.getElementById('main').innerHTML = `
    <div class="page-title">Businesses with Cards</div>
    <div class="card">
      <table>
        <thead><tr><th>Business Name</th><th>NIF</th><th>Sector</th><th>Cards</th><th>Credit Limit</th><th>Used</th><th>Amount Due</th><th>Due Date</th><th>Status</th></tr></thead>
        <tbody>
          <tr class="row" onclick="bankBizDetail()"><td><b>Restaurante Sol Madrid</b></td><td>B-86423157</td><td>Restaurant</td><td>3</td><td>€50,000</td><td>€18,340</td><td>€4,280</td><td>30/06/2025</td><td><span class="badge badge-green">Active</span></td></tr>
          <tr class="row" onclick="modal('Tapas &amp; Co S.L.','Click Restaurante Sol Madrid for the full demo detail panel.')"><td><b>Tapas & Co S.L.</b></td><td>B-91234567</td><td>Bar/Café</td><td>1</td><td>€20,000</td><td>€5,600</td><td>€1,150</td><td>15/07/2025</td><td><span class="badge badge-green">Active</span></td></tr>
          <tr class="row" onclick="modal('Hotel Castellana Group','Click Restaurante Sol Madrid for the full demo detail panel.')"><td><b>Hotel Castellana Group</b></td><td>A-78345621</td><td>Hotel</td><td>5</td><td>€150,000</td><td>€63,000</td><td>€12,400</td><td>30/06/2025</td><td><span class="badge badge-green">Active</span></td></tr>
        </tbody>
      </table>
    </div>`;
}

function bankBizDetail() {
  openPanel(`
    <div class="panel-head"><h3>Restaurante Sol Madrid</h3><span class="close-btn" onclick="closePanel()">×</span></div>
    <div class="card" style="background:#f9f9f9;box-shadow:none;border:1px solid var(--border);">
      <div class="section-title" style="margin-bottom:10px;">Card Programme</div>
      <div style="font-size:13px;line-height:2;">
        Mother VCN: <b>•••• •••• •••• 4521</b><br>
        Credit Limit: <b>€50,000</b> &nbsp;|&nbsp; Used: <b>€18,340</b> &nbsp;|&nbsp; Available: <b>€31,660</b><br>
        Programme Start: <b>01/01/2024</b> &nbsp;|&nbsp; Next Billing: <b>30/06/2025</b>
      </div>
    </div>
    <div class="section-title">Active Child Cards</div>
    <div class="action-row">
      <button id="bank-rm-sel" class="btn btn-grey btn-sm" onclick="bankRemoveSel()">Remove Selected</button>
      <button class="btn btn-outline-red btn-sm" onclick="if(confirm('Remove all cards?')) modal('Done','All cards removed.')">Remove All</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th></th><th>Card</th><th>Purpose</th><th>Amount</th><th>Expiry</th><th>Type</th><th>Status</th></tr></thead>
        <tbody id="bank-vcn-body">
          <tr><td><input type="checkbox" onchange="bankCheckChange()"></td><td>•••• 6047</td><td>IVA Q2 2025</td><td>€4,280</td><td>26/06/2025</td><td>Single-use</td><td><span class="badge badge-green">Active</span></td></tr>
          <tr><td><input type="checkbox" onchange="bankCheckChange()"></td><td>•••• 3892</td><td>Seafood Supplier</td><td>€3,200</td><td>31/07/2025</td><td>C2A</td><td><span class="badge badge-green">Active</span></td></tr>
          <tr><td><input type="checkbox" onchange="bankCheckChange()"></td><td>•••• 7741</td><td>Cleaning Supplies</td><td>€890</td><td>15/07/2025</td><td>C2A</td><td><span class="badge badge-green">Active</span></td></tr>
        </tbody>
      </table>
    </div>
    <hr class="divider">
    <div class="section-title">Recent Transactions</div>
    <table style="font-size:12px;">
      <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Card</th><th>Status</th></tr></thead>
      <tbody>
        <tr><td>20/06/2025</td><td>Proveedor Alimentación S.L.</td><td>€3,100</td><td>•••• 3892</td><td>Completed</td></tr>
        <tr><td>15/06/2025</td><td>AEAT — IVA Q1 2025</td><td>€3,980</td><td>•••• 9921</td><td>Completed</td></tr>
        <tr><td>01/06/2025</td><td>Lavandería Central S.L.</td><td>€1,200</td><td>•••• 8821</td><td>Completed</td></tr>
      </tbody>
    </table>
    <hr class="divider">
    <div class="action-row">
      <button class="btn btn-outline-red btn-sm" onclick="modal('Programme Suspended','VCN programme for Restaurante Sol Madrid has been suspended.')">Suspend Programme</button>
      <button class="btn btn-grey btn-sm" onclick="modal('Programme Details','Credit limit and billing details for Restaurante Sol Madrid.')">View Billing</button>
    </div>`);
}

function bankCheckChange() {
  const checked = document.querySelectorAll('#bank-vcn-body input[type=checkbox]:checked').length;
  const btn = document.getElementById('bank-rm-sel');
  if(btn) {
    btn.className = checked>0 ? 'btn btn-red btn-sm' : 'btn btn-grey btn-sm';
    btn.onclick = checked>0 ? bankRemoveSel : null;
  }
}
function bankRemoveSel() {
  if(confirm('Remove selected card(s)?')) modal('Done','Selected card(s) have been removed.');
}

function bankEligible() {
  document.getElementById('main').innerHTML = `
    <div class="page-title">Eligible Businesses</div>
    <div class="card">
      <table>
        <thead><tr><th>Business Name</th><th>NIF</th><th>Sector</th><th>Credit Rating</th><th>Recommended Limit</th><th>Action</th></tr></thead>
        <tbody>
          <tr><td>Bar Central Madrid S.L.</td><td>B-84512367</td><td>Restaurant</td><td>A-</td><td>€15,000</td><td><button class="btn btn-red btn-sm" onclick="issueCardModal('Bar Central Madrid S.L.','B-84512367','15000')">Issue Card</button></td></tr>
          <tr><td>Cervecería Norte S.L.</td><td>B-79234512</td><td>Bar/Café</td><td>B+</td><td>€10,000</td><td><button class="btn btn-red btn-sm" onclick="issueCardModal('Cervecería Norte S.L.','B-79234512','10000')">Issue Card</button></td></tr>
          <tr><td>Restaurante Goya S.L.</td><td>B-82345671</td><td>Restaurant</td><td>A</td><td>€25,000</td><td><button class="btn btn-red btn-sm" onclick="issueCardModal('Restaurante Goya S.L.','B-82345671','25000')">Issue Card</button></td></tr>
        </tbody>
      </table>
    </div>`;
}

function issueCardModal(name,nif,limit) {
  modal(`Issue Card: ${name}`,`
    <div class="fg"><label>Business Name</label><input value="${name}" readonly style="background:#f5f5f5;"></div>
    <div class="fg"><label>NIF</label><input value="${nif}" readonly style="background:#f5f5f5;"></div>
    <div class="fg"><label>Credit Limit (€)</label><input type="number" value="${limit}" id="issue-limit"></div>
    <div class="fg"><label>Programme Start Date</label><input type="date" value="2025-06-26"></div>
    <button class="btn btn-red" style="width:100%;margin-top:8px;" onclick="closeModal();modal('Programme Created','Mother VCN generated and sent to ${name}.')">Confirm & Issue</button>`);
}
